name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          cd ~/task-manager-api
          git pull origin main
          docker compose up -d --build
          docker compose exec -T api pytest tests/ -v

  deploy:
    runs-on: self-hosted
    needs: test

    steps:
      - name: Deploy
        run: |
          cd ~/task-manager-api
          docker compose ps
